<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HYERIM CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- SheetJS for real Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;
  --sidebar:#ffffff;
  --surface:#ffffff;
  --surface2:#f0f2f5;
  --border:#e4e7ed;
  --border2:#d0d5df;
  --accent:#4f6ef7;
  --accent-dim:rgba(79,110,247,0.08);
  --green:#16a34a;
  --green-dim:rgba(22,163,74,0.08);
  --yellow:#d97706;
  --yellow-dim:rgba(217,119,6,0.08);
  --orange:#ea580c;
  --orange-dim:rgba(234,88,12,0.08);
  --red:#dc2626;
  --red-dim:rgba(220,38,38,0.08);
  --purple:#7c3aed;
  --purple-dim:rgba(124,58,237,0.08);
  --teal:#0d9488;
  --teal-dim:rgba(13,148,136,0.08);
  --text:#111827;
  --text2:#6b7280;
  --text3:#9ca3af;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --r:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-hover:0 4px 16px rgba(0,0,0,.12);
  --shadow-drag:0 20px 48px rgba(0,0,0,.2);
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* 탑바 */
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0;background:#fff}
.logo{display:flex;align-items:center;gap:9px;margin-right:24px}
.logo-mark{width:26px;height:26px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;font-family:var(--mono)}
.logo-name{font-weight:700;font-size:14px;letter-spacing:-.02em}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
.breadcrumb .sep{color:var(--text3)}
.breadcrumb .cur{color:var(--text);font-weight:500}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:var(--sans)}
.btn-ghost{background:#fff;border-color:var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.08)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#4f6ef7,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer}

/* 서브헤더 */
.subheader{border-bottom:1px solid var(--border);background:#fff;flex-shrink:0}
.subheader-top{display:flex;align-items:center;padding:12px 20px 0;gap:10px}
.page-title{font-size:16px;font-weight:700;letter-spacing:-.02em}
.total-badge{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:2px 8px;font-family:var(--mono);font-size:10px;color:var(--text2)}
.pipeline-total{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text2)}
.pipeline-total span{color:var(--green);font-weight:600}
.subheader-tabs{display:flex;padding:0 20px;margin-top:2px}
.stab{padding:8px 12px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.stab:hover{color:var(--text2)}
.stab.on{color:var(--text);border-bottom-color:var(--accent)}
.subheader-filters{display:flex;align-items:center;gap:6px;padding:8px 20px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--sans);user-select:none}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.chip.active-sort{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);font-weight:600}
.chip-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
.view-toggle{display:flex;gap:2px}
.view-btn{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text3);transition:all .15s}
.view-btn.on{background:var(--surface2);color:var(--text)}

/* 칸반 보드 */
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px 20px 0;display:flex;gap:12px;min-width:0;max-height:calc(100vh - 180px)}
.board-wrap::-webkit-scrollbar{height:6px}
.board-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* 컬럼 */
.col{width:268px;min-width:260px;display:flex;flex-direction:column;max-height:100%;animation:slideUp .3s ease both}
.col:nth-child(1){animation-delay:.04s}
.col:nth-child(2){animation-delay:.08s}
.col:nth-child(3){animation-delay:.12s}
.col:nth-child(4){animation-delay:.16s}
.col:nth-child(5){animation-delay:.20s}
.col:nth-child(6){animation-delay:.24s}
.col-header{display:flex;align-items:center;gap:7px;padding:0 2px 10px;flex-shrink:0}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-name{font-size:12px;font-weight:600}
.col-count{font-family:var(--mono);font-size:10px;color:var(--text2);background:var(--surface2);border-radius:10px;padding:1px 6px}
.col-amount{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text2)}
.col-add{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--text3);cursor:pointer;font-size:16px;transition:all .15s}
.col-add:hover{background:var(--surface2);color:var(--text)}
.col-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 0 20px;border-radius:var(--r);transition:background .12s, outline .12s;min-height:80px}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.col-body.drag-over{background:var(--accent-dim);outline:2px dashed var(--accent);outline-offset:-2px}

/* 딜 카드 */
.deal-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:13px;cursor:grab;transition:box-shadow .15s,border-color .15s,opacity .15s;position:relative;overflow:hidden;user-select:none;flex-shrink:0}
.deal-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.deal-card:hover{box-shadow:var(--shadow-hover);border-color:var(--border2)}
.deal-card:active{cursor:grabbing}
.deal-card.dragging{opacity:.3;box-shadow:none;border-style:dashed;cursor:grabbing}
.deal-card.c-blue::before{background:#4f6ef7}
.deal-card.c-yellow::before{background:#d97706}
.deal-card.c-orange::before{background:#ea580c}
.deal-card.c-purple::before{background:#7c3aed}
.deal-card.c-teal::before{background:#0d9488}
.deal-card.c-green::before{background:#16a34a}
.deal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.deal-title{font-size:12px;font-weight:600;line-height:1.4}
.deal-menu{color:var(--text3);cursor:pointer;font-size:14px;line-height:1;flex-shrink:0;opacity:0;transition:opacity .15s;padding:1px 3px}
.deal-card:hover .deal-menu{opacity:1}
.deal-delete{color:#ef4444;cursor:pointer;font-size:11px;font-weight:700;flex-shrink:0;opacity:0;transition:opacity .15s;padding:1px 5px;border-radius:3px;line-height:1.2}
.deal-card:hover .deal-delete{opacity:1}
.deal-delete:hover{background:#fee2e2}
.deal-company{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.co-avatar{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.co-name{font-size:11px;color:var(--text2)}
.deal-amount{font-family:var(--mono);font-size:14px;font-weight:600;margin-bottom:9px;letter-spacing:-.02em}
.deal-footer{display:flex;align-items:center;gap:5px}
.deal-tag{display:inline-flex;align-items:center;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:500}
.tag-blue{background:var(--accent-dim);color:var(--accent)}
.tag-green{background:var(--green-dim);color:var(--green)}
.tag-yellow{background:var(--yellow-dim);color:var(--yellow)}
.tag-orange{background:var(--orange-dim);color:var(--orange)}
.tag-purple{background:var(--purple-dim);color:var(--purple)}
.tag-teal{background:var(--teal-dim);color:var(--teal)}
.tag-gray{background:var(--surface2);color:var(--text2)}
.deal-avatars{display:flex;margin-left:auto}
.deal-avatar-sm{width:18px;height:18px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;margin-left:-5px}
.deal-avatar-sm:first-child{margin-left:0}
.deal-progress{margin-top:8px}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px}
.deal-date{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);margin-top:6px}
.deal-date.warn{color:var(--orange)}
.add-card{border:1.5px dashed var(--border2);border-radius:var(--r);padding:10px;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--text3);cursor:pointer;font-size:11px;transition:all .2s;flex-shrink:0;background:transparent}
.add-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* 드래그 고스트 */
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;transform:rotate(1.5deg) scale(1.02);box-shadow:var(--shadow-drag);border-radius:var(--r);opacity:.96;transition:none}

/* 요약바 */
.summary-bar{border-top:1px solid var(--border);background:#fff;padding:7px 20px;display:flex;align-items:center;gap:18px;flex-shrink:0;font-size:11px;color:var(--text2)}
.sum-item{display:flex;align-items:center;gap:5px}
.sum-dot{width:7px;height:7px;border-radius:50%}
.sum-val{font-family:var(--mono);color:var(--text);font-weight:600;margin-left:2px}

/* 토스트 */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:#111827;color:#fff;border-radius:8px;padding:8px 16px;font-size:12px;opacity:0;pointer-events:none;transition:all .22s;z-index:9000;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardDrop{from{opacity:0;transform:scale(.95) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.card-dropped{animation:cardDrop .22s ease}

/* ── 모달 (딜 추가) ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:480px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal-title{font-size:15px;font-weight:700}
.modal label{font-size:11px;color:var(--text2);display:flex;flex-direction:column;gap:4px}
.modal input,.modal select{border:1px solid var(--border2);border-radius:7px;padding:8px 10px;font-size:13px;font-family:var(--sans);outline:none}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

/* ── 딜 상세 모달 ── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center}
.detail-overlay.show{display:flex}
.detail-modal{background:#fff;border-radius:16px;width:540px;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.detail-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);position:relative}
.detail-stage-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;margin-bottom:10px}
.detail-title{font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.3}
.detail-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:16px;transition:all .15s}
.detail-close:hover{background:var(--surface2);color:var(--text)}
.detail-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.detail-section{display:flex;flex-direction:column;gap:8px}
.detail-section-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.detail-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:8px}
.detail-row-label{font-size:11px;color:var(--text2);width:72px;flex-shrink:0}
.detail-row-value{font-size:12px;font-weight:500;color:var(--text)}
.detail-amount-big{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:-.03em;color:var(--text)}
.detail-progress-wrap{margin-top:4px}
.detail-progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px}
.detail-progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.detail-progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
.detail-owners-row{display:flex;gap:8px;flex-wrap:wrap}
.detail-owner-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface2);border-radius:20px;font-size:11px;font-weight:500}
.detail-owner-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.detail-footer{padding:12px 24px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── 소팅 뷰 (담당자/회사/마감일) ── */
.sort-view{display:none;flex:1;overflow:auto;overflow-x:auto;padding:16px 20px;position:relative;z-index:1}
.sort-view.show{display:flex;flex-direction:column}
.board-kanban{display:flex;gap:12px;min-height:0}
/* 담당자 뷰 */
.owner-group{margin-bottom:20px}
.owner-group-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.owner-av-lg{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.owner-name-lg{font-size:14px;font-weight:600}
.owner-deal-count{font-size:11px;color:var(--text2);margin-left:2px}
.owner-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
/* 회사 뷰 */
.company-group{margin-bottom:20px}
.company-group-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.company-av-lg{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.company-name-lg{font-size:14px;font-weight:600}
/* 금액 뷰 */
.amount-list{display:flex;flex-direction:column;gap:0}
.amount-row{display:grid;grid-template-columns:1fr 140px 120px 120px 100px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);background:#fff;cursor:pointer;transition:background .1s}
.amount-row:hover{background:#f9fafb}
.amount-row.header-row{background:var(--surface2);font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;cursor:default;border-radius:8px 8px 0 0;border-bottom:2px solid var(--border2)}
.amount-row:last-child{border-bottom:none;border-radius:0 0 8px 8px}
.amount-table{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.amount-bar-cell{display:flex;align-items:center;gap:8px}
.amt-mini-bar{height:6px;background:var(--accent);border-radius:3px;transition:width .4s ease}
/* 마감일 뷰 */
.deadline-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.deadline-table th{background:var(--surface2);padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--border2)}
.deadline-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.deadline-table tr:last-child td{border-bottom:none}
.deadline-table tr:hover td{background:#f9fafb}
.deadline-table tr.warn-row td{background:#fff7ed}
.deadline-table tr.warn-row:hover td{background:#ffedd5}
.dl-days-chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;font-family:var(--mono)}
.dl-ok{background:var(--green-dim);color:var(--green)}
.dl-warn{background:var(--yellow-dim);color:var(--yellow)}
.dl-danger{background:var(--red-dim);color:var(--red)}
.dl-past{background:var(--surface2);color:var(--text3)}

/* 금액순 정렬 버튼 */
.sort-dir-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:#fff;color:var(--text2);transition:all .15s}
.sort-dir-btn:hover{background:var(--surface2);color:var(--text)}
.sort-dir-btn.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
/* ── 활동 로그 ── */
.activity-tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin:0 -24px;padding:0 24px}
.activity-tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.activity-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.activity-tab:hover:not(.on){color:var(--text2)}

.activity-log{display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);position:relative}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.act-call{background:#eff6ff}
.act-email{background:#f0fdf4}
.act-meeting{background:#faf5ff}
.act-note{background:#fffbeb}
.activity-content{flex:1;min-width:0}
.activity-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.activity-type{font-size:11px;font-weight:600;color:var(--text)}
.activity-time{font-size:10px;color:var(--text3);margin-left:auto;font-family:var(--mono)}
.activity-desc{font-size:12px;color:var(--text2);line-height:1.5;word-break:break-all}
.activity-owner-chip{font-size:10px;color:var(--text3);background:var(--surface2);border-radius:10px;padding:1px 7px}

.activity-add-form{background:var(--surface2);border-radius:10px;padding:12px;margin-top:4px;display:flex;flex-direction:column;gap:8px}
.activity-type-btns{display:flex;gap:6px;flex-wrap:wrap}
.act-type-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:#fff;font-size:11px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:4px}
.act-type-btn:hover{border-color:var(--accent);color:var(--accent)}
.act-type-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);font-weight:600}
.activity-textarea{border:1px solid var(--border2);border-radius:7px;padding:8px 10px;font-size:12px;font-family:var(--sans);resize:none;outline:none;line-height:1.5;background:#fff}
.activity-textarea:focus{border-color:var(--accent)}
.activity-form-footer{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.activity-empty{text-align:center;padding:32px 0;color:var(--text3);font-size:12px}

<script>
let currentTab = 'all'; // 현재 탭 상태
const MY_INITIAL = '이'; // ← 본인 이름 첫 글자로 바꾸세요

// 고급 필터 상태
let advFilters = { thismonth: false, bigdeal: false, warn: false };

function toggleAdvFilter(key){
  advFilters[key] = !advFilters[key];
  document.getElementById('chip-'+key).classList.toggle('on', advFilters[key]);
  if(currentView === 'kanban') renderAll();
  else renderDateView();
}

function applyAdvFilters(deals){
  const today = new Date();
  return deals.filter(d => {
    if(advFilters.thismonth){
      const dd = new Date(d.date.replaceAll('.','-'));
      if(!(dd.getFullYear()===today.getFullYear() && dd.getMonth()===today.getMonth())) return false;
    }
    if(advFilters.bigdeal){
      if(d.amtRaw < 5000) return false;
    }
    if(advFilters.warn){
      if(!d.warn) return false;
    }
    return true;
  });
}

function switchTab(tab, el){
  currentTab = tab;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');

  const board = document.getElementById('board');
  const sortView = document.getElementById('sortView');
  const dashView = document.getElementById('dashView');
  const summaryBar = document.getElementById('summaryBar');
  const filterBar = document.getElementById('filterBar');
  const contactsView = document.getElementById('contactsView');
  const companiesView = document.getElementById('companiesView');
  if(contactsView) contactsView.style.display='none';
  if(companiesView) companiesView.style.display='none';

  if(tab === 'dashboard'){
    board.style.display = 'none';
    sortView.style.display = 'none';
    summaryBar.style.display = 'none';
    dashView.style.display = 'block';
    document.getElementById('viewToggle').style.display = 'none';
    if(filterBar) filterBar.style.display = 'none';
    renderDashboard();
} else {
    board.style.display = currentView === 'kanban' ? 'flex' : 'none';
    sortView.style.display = currentView === 'table' ? 'flex' : 'none';
    summaryBar.style.display = '';
    dashView.style.display = 'none';
    document.getElementById('viewToggle').style.display = '';
    if(filterBar) filterBar.style.display = 'flex';
    if(currentView === 'table') renderDateView(); else renderAll();
  }
}

function timeAgo(isoStr){
  const diff = Date.now() - new Date(isoStr).getTime();
  const m = Math.floor(diff/60000);
  if(m < 1) return '방금 전';
  if(m < 60) return `${m}분 전`;
  const h = Math.floor(m/60);
  if(h < 24) return `${h}시간 전`;
  const day = Math.floor(h/24);
  if(day < 8) return `${day}일 전`;
  return new Date(isoStr).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}

function renderActivityLog(dealId){
  const d = findDeal(dealId);
  if(!d) return;
  const acts = (d.activities || []).slice().reverse(); // 최신 먼저

  const typeButtons = ACT_TYPES.map(t =>
    `<button class="act-type-btn${actSelectedType===t.id?' on':''}" onclick="actSelectedType='${t.id}';renderActivityLog('${dealId}')">${t.icon} ${t.label}</button>`
  ).join('');

  const logItems = acts.length === 0
    ? `<div class="activity-empty">📋 아직 활동 기록이 없어요<br><span style="font-size:11px">아래에서 첫 활동을 추가해보세요</span></div>`
    : acts.map(a => {
        const t = ACT_TYPES.find(x=>x.id===a.type) || ACT_TYPES[3];
        return `<div class="activity-item">
          <div class="activity-icon ${t.cls}">${t.icon}</div>
          <div class="activity-content">
            <div class="activity-header">
              <span class="activity-type">${t.label}</span>
              <span class="activity-owner-chip">${a.owner||'나'}</span>
              <span class="activity-time">${timeAgo(a.createdAt)}</span>
            </div>
            <div class="activity-desc">${a.desc.replace(/\n/g,'<br>')}</div>
          </div>
        </div>`;
      }).join('');

  document.getElementById('activityLogArea').innerHTML = `
    <div class="activity-log">${logItems}</div>
    <div class="activity-add-form">
      <div class="activity-type-btns">${typeButtons}</div>
      <textarea id="actTextarea" class="activity-textarea" rows="2" placeholder="활동 내용을 입력하세요..."></textarea>
      <div class="activity-form-footer">
        <span style="font-size:11px;color:var(--text3)">Enter: 줄바꿈 / Ctrl+Enter: 저장</span>
        <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="renderActivityLog('${dealId}')">취소</button>
        <button class="btn btn-primary" style="font-size:11px;padding:4px 10px" onclick="submitActivity('${dealId}')">저장</button>
      </div>
    </div>`;

  // Ctrl+Enter 단축키
  setTimeout(()=>{
    const ta = document.getElementById('actTextarea');
    if(ta) ta.addEventListener('keydown', e=>{
      if(e.key==='Enter' && (e.ctrlKey||e.metaKey)){e.preventDefault();submitActivity(dealId);}
    });
  }, 0);
}

function submitActivity(dealId){
  const ta = document.getElementById('actTextarea');
  const desc = ta ? ta.value.trim() : '';
  if(!desc){ta && ta.focus();return;}
  const d = findDeal(dealId);
  if(!d) return;
  if(!d.activities) d.activities = [];
  d.activities.push({
    id: 'a'+Date.now(),
    type: actSelectedType,
    desc,
    owner: MY_INITIAL || '나',
    createdAt: new Date().toISOString()
  });
  localStorage.setItem('hyerim_crm_cols', JSON.stringify(COLS));
  renderActivityLog(dealId);
  // 카드의 마지막 활동 표시 업데이트
  renderAll();
  showToast('활동이 기록되었습니다');
}

  </div>

}
/* ────────────────────────────────
   Win Rate / 전환율 계산
──────────────────────────────── */
function calcWinRate() {
  // 각 단계별 딜 수 (현재 + 그 이후로 넘어간 딜 포함 추정)
  // 실제 이동 로그가 없으므로 "현재 단계 이상에 있는 딜 수"로 누적 계산
  const stageOrder = COLS.map(c => c.id);
  const result = [];

  for (let i = 0; i < COLS.length - 1; i++) {
    const fromCol = COLS[i];
    // '이 단계 이후에 있는 딜' = 현재 단계 index 이상인 컬럼의 딜 합계
    const fromCount = COLS.slice(i).reduce((s, c) => s + c.deals.length, 0);
    const toCount   = COLS.slice(i + 1).reduce((s, c) => s + c.deals.length, 0);
    const rate = fromCount === 0 ? 0 : Math.round(toCount / fromCount * 100);
    result.push({
      from: fromCol.name,
      to: COLS[i + 1].name,
      fromCount,
      toCount,
      rate,
      dot: fromCol.dotColor,
      warning: rate < 40 && i > 0  // 중간 단계 전환율 40% 미만이면 경고
    });
  }
  return result;
}

  if(tableSortKey==='amount'){va=a.amtRaw;vb=b.amtRaw;return tableSortDir==='asc'?va-vb:vb-va;}
  if(tableSortKey==='progress'){va=a.progress;vb=b.progress;return tableSortDir==='asc'?va-vb:vb-va;}

});

function exportExcel(mode){
  if(!mode) mode = 'all';
  const menu = document.getElementById('excelMenu');
  if(menu) menu.style.display = 'none';

  const today = new Date();
  const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;

  // ── 대시보드 요약 ──────────────────────────────
  if(mode === 'dashboard'){
    const all = COLS.flatMap(c=>c.deals.map(d=>({...d,stage:c.name,stageId:c.id})));
    const closed = all.filter(d=>d.stageId==='closed');

    // 시트1: 요약
    const totalRaw = all.reduce((s,d)=>s+d.amtRaw,0);
    const closedRaw = closed.reduce((s,d)=>s+d.amtRaw,0);
    const summaryRows = [
      {'항목':'전체 파이프라인 (만원)','값':totalRaw},
      {'항목':'계약 완료 (만원)','값':closedRaw},
      {'항목':'전체 딜 수','값':all.length},
      {'항목':'완료 딜 수','값':closed.length},
      {'항목':'마감 임박 딜 수','값':all.filter(d=>d.warn).length},
    ];

    // 시트2: 단계별
    const stageRows = COLS.map(c=>({
      '단계':c.name,
      '딜 수':c.deals.length,
      '총 금액 (만원)':c.deals.reduce((s,d)=>s+d.amtRaw,0),
    }));

    // 시트3: 담당자별
    const ownerMap = {};
    all.forEach(d=>d.owners.forEach(o=>{
      if(!ownerMap[o]) ownerMap[o]={name:o,count:0,raw:0,closed:0};
      ownerMap[o].count++;ownerMap[o].raw+=d.amtRaw;
      if(d.stageId==='closed') ownerMap[o].closed++;
    }));
    const ownerRows = Object.values(ownerMap).sort((a,b)=>b.raw-a.raw).map(o=>({
      '담당자':o.name,'딜 수':o.count,'완료':o.closed,'총 금액 (만원)':o.raw
    }));

    // 시트4: 전환율
    const rateRows = [];
    for(let i=0;i<COLS.length-1;i++){
      const fromCount = COLS.slice(i).reduce((s,c)=>s+c.deals.length,0);
      const toCount   = COLS.slice(i+1).reduce((s,c)=>s+c.deals.length,0);
      rateRows.push({
        '출발 단계':COLS[i].name,
        '도착 단계':COLS[i+1].name,
        '출발 딜 수':fromCount,
        '도착 딜 수':toCount,
        '전환율 (%)': fromCount===0?0:Math.round(toCount/fromCount*100)
      });
    }

    const wb = XLSX.utils.book_new();
    const ws1 = XLSX.utils.json_to_sheet(summaryRows);
    ws1['!cols']=[{wch:28},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws1, '요약');
    const ws2 = XLSX.utils.json_to_sheet(stageRows);
    ws2['!cols']=[{wch:14},{wch:10},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws2, '단계별');
    const ws3 = XLSX.utils.json_to_sheet(ownerRows);
    ws3['!cols']=[{wch:10},{wch:8},{wch:8},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws3, '담당자별');
    const ws4 = XLSX.utils.json_to_sheet(rateRows);
    ws4['!cols']=[{wch:14},{wch:14},{wch:12},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb, ws4, '전환율');
    XLSX.writeFile(wb, `HYERIM_CRM_대시보드_${dateStr}.xlsx`);
    showToast('대시보드 요약이 다운로드되었습니다 ✅');
    return;
  }

  // ── 딜 목록 공통 ──────────────────────────────
  let deals;
  let label;

  if(mode === 'mine'){
    deals = COLS.flatMap(c=>c.deals
      .filter(d=>d.owners.includes(MY_INITIAL))
      .map(d=>({...d,stage:c.name,stageId:c.id})));
    label = '내담당';
  } else if(mode === 'filtered'){
    // 현재 탭 + 현재 필터 그대로 적용
    const base = COLS.flatMap(c=>c.deals
      .filter(d => currentTab !== 'mine' || d.owners.includes(MY_INITIAL))
      .map(d=>({...d,stage:c.name,stageId:c.id})));
    deals = applyAdvFilters(base);
    const tags = [];
    if(advFilters.thismonth) tags.push('이번달마감');
    if(advFilters.bigdeal)   tags.push('5천만이상');
    if(advFilters.warn)      tags.push('마감임박');
    label = tags.length ? tags.join('_') : '전체';
  } else {
    deals = COLS.flatMap(c=>c.deals.map(d=>({...d,stage:c.name,stageId:c.id})));
    label = '전체';
  }

  const rows = deals.map(d=>({
    '딜 이름': d.title,
    '회사': d.company,
    '단계': d.stage,

    '금액': d.amount,
    '담당자': d.owners.join(', '),

    '진행률 (%)': d.progress,
    '마감 임박': d.warn ? '⚠ 임박' : '',
    '메모': d.note || ''
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:22},{wch:16},{wch:12},{wch:12},{wch:10},{wch:14},{wch:10},{wch:12},{wch:10},{wch:10},{wch:30}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '영업기회_'+label);

  XLSX.writeFile(wb, `HYERIM_CRM_${label}_${dateStr}.xlsx`);
  showToast(`"${label}" 목록이 다운로드되었습니다 ✅`);
}

let dragId=null, fromColId=null, ghost=null, ox=0, oy=0, overBody=null;

function bindDrag(){
  document.querySelectorAll('.deal-card').forEach(card=>{
    card.addEventListener('mousedown', startDrag);
  });
}

function startDrag(e){
  if(e.button!==0) return;
  if(e.target.closest('.deal-menu')) return;
  const card = e.currentTarget;
  dragId    = card.dataset.deal;
  fromColId = card.dataset.col;
  const rect = card.getBoundingClientRect();
  ox = e.clientX - rect.left;
  oy = e.clientY - rect.top;
  ghost = card.cloneNode(true);
  ghost.classList.add('drag-ghost');
  ghost.style.cssText += `width:${rect.width}px;left:${rect.left}px;top:${rect.top}px`;
  document.body.appendChild(ghost);
  card.classList.add('dragging');
  document.body.style.cursor = 'grabbing';
  document.addEventListener('mousemove', moveDrag);
  document.addEventListener('mouseup',   endDrag);
  e.preventDefault();
}

function moveDrag(e){
  if(!ghost) return;
  ghost.style.left = (e.clientX - ox)+'px';
  ghost.style.top  = (e.clientY - oy)+'px';
  ghost.style.visibility='hidden';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  ghost.style.visibility='';
  const body = el && el.closest('.col-body');
  if(body !== overBody){
    overBody && overBody.classList.remove('drag-over');
    overBody = body;
    overBody && overBody.classList.add('drag-over');
  }
}

function endDrag(e){
  document.removeEventListener('mousemove', moveDrag);
  document.removeEventListener('mouseup',   endDrag);
  document.body.style.cursor = '';
  overBody && overBody.classList.remove('drag-over');
  ghost.style.visibility='hidden';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  ghost.remove(); ghost=null;
  const origCard = document.querySelector(`.deal-card[data-deal="${dragId}"]`);
  origCard && origCard.classList.remove('dragging');
  const targetBody = el && el.closest('.col-body');
  const toColId = targetBody ? targetBody.dataset.col : null;
  if(toColId && toColId !== fromColId){
    const fromCol = COLS.find(c=>c.id===fromColId);
    const toCol   = COLS.find(c=>c.id===toColId);
    const idx = fromCol.deals.findIndex(d=>d.id===dragId);
    if(idx!==-1){
      const [deal] = fromCol.deals.splice(idx,1);
      toCol.deals.unshift(deal);
      renderAll();
      requestAnimationFrame(()=>{
        const dropped = document.querySelector(`.deal-card[data-deal="${deal.id}"]`);
        if(dropped){ dropped.classList.add('card-dropped'); dropped.addEventListener('animationend',()=>dropped.classList.remove('card-dropped'),{once:true}); }
      });
      showToast(`"${deal.title}" → ${toCol.name}`);
    }
  }
  overBody=null; dragId=null; fromColId=null;
}

  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

renderCompanies();

  {id:'p2', name:'박지훈', title:'디지털혁신팀 차장', company:'현대오토에버', phone:'010-9876-5432', email:'park@autoever.com', note:'기술 검토 담당, HR솔루션 도입 검토 중', color:'#7c3aed'},
  {id:'p3', name:'김수진', title:'클라우드사업팀 과장', company:'LG CNS', phone:'010-5555-7777', email:'kim@lgcns.com', note:'클라우드 마이그레이션 담당자', color:'#16a34a'},
  {id:'p4', name:'최민준', title:'CTO', company:'카카오', phone:'010-3333-4444', email:'choi@kakao.com', note:'CRM 도입 결정권자, 빠른 의사결정 스타일', color:'#ea580c'},

function saveContacts(){ localStorage.setItem('hyerim_crm_contacts', JSON.stringify(CONTACTS)); }
function openAddContactModal(){ document.getElementById('contactModal').classList.add('show'); }

  document.getElementById('contactModal').classList.remove('show');
  ['ct-name','ct-title','ct-company','ct-phone','ct-email','ct-note'].forEach(id=>document.getElementById(id).value='');
}

function openEditContactModal(id){

  if(!p) return;

function submitEditContact(){
  const id = document.getElementById('ce-id').value;
  const p = CONTACTS.find(c=>c.id===id);
  if(!p) return;
  p.name = document.getElementById('ce-name').value.trim() || p.name;

function deleteContact(id){
  if(!confirm('연락처를 삭제할까요?')) return;
  CONTACTS = CONTACTS.filter(c=>c.id!==id);
  saveContacts();
  renderContacts();
}
function getDealsForContact(contactCompany){
  return COLS.flatMap(c=>c.deals.filter(d=>d.company===contactCompany).map(d=>{
    const col = COLS.find(cc=>cc.deals.some(x=>x.id===d.id));
    return {...d, stage:col?.name, dotColor:col?.dotColor};
  }));
}
function renderContacts(){
  const q = (document.getElementById('contactSearchInput')?.value||'').trim().toLowerCase();
  let list = CONTACTS;
  if(q) list = list.filter(p=>
    p.name.toLowerCase().includes(q) ||
    (p.company||'').toLowerCase().includes(q) ||
    (p.title||'').toLowerCase().includes(q)
  );
  const container = document.getElementById('contactsGrid');
  if(!container) return;
  if(list.length === 0){
    container.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text3);font-size:13px">검색 결과가 없습니다</div>';
    return;
  }
  container.innerHTML = `<div class="contacts-grid-inner">${list.map(p=>{
    const deals = getDealsForContact(p.company);
    const dealChips = deals.slice(0,3).map(d=>`
      <div class="contact-deal-chip" onclick="event.stopPropagation();openDetail('${d.id}')">
        <span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">${d.title}</span>
        <span style="font-family:var(--mono);font-size:10px;color:${d.dotColor||'var(--accent)'};flex-shrink:0;margin-left:4px">${d.stage}</span>
      </div>`).join('');
    const moreBadge = deals.length > 3 ? `<div style="font-size:10px;color:var(--text3);padding:2px 8px">+${deals.length-3}건 더</div>` : '';
    return `<div class="contact-card" onclick="openEditContactModal('${p.id}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="contact-avatar-lg" style="background:${p.color}">${p.name[0]}</div>
        <div style="flex:1;min-width:0">
          <div class="contact-name">${p.name}</div>
          <div class="contact-title-text">${p.title||''}${p.company?` · <span style="color:var(--accent)">${p.company}</span>`:''}</div>
        </div>
        <div onclick="event.stopPropagation();deleteContact('${p.id}')" style="color:var(--text3);font-size:12px;cursor:pointer;padding:4px 6px;border-radius:5px;transition:all .15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">✕</div>
      </div>
      ${p.phone||p.email?`<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px">
        ${p.phone?`<div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px"><span>📞</span>${p.phone}</div>`:''}
        ${p.email?`<div style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:4px"><span>✉️</span>${p.email}</div>`:''}
      </div>`:''}
      ${deals.length>0?`<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">연결된 딜 (${deals.length}건)</div>
        <div class="contact-deals-row">${dealChips}${moreBadge}</div>`:
        `<div style="font-size:11px;color:var(--text3);padding:8px 0">연결된 딜 없음</div>`}
      ${p.note?`<div style="margin-top:8px;font-size:11px;color:var(--text2);background:var(--surface2);border-radius:6px;padding:6px 9px;line-height:1.5">${p.note}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}
/* ── 마감 임박 배너 ── */
function checkDeadlineBanner(){
  const today = new Date();
  const threeDays = new Date(today.getTime() + 3*24*60*60*1000);
  const urgentDeals = COLS.flatMap(c=>c.deals).filter(d=>{
    const dd = new Date(d.date.replaceAll('.','-'));
    return dd >= today && dd <= threeDays;
  });
  if(urgentDeals.length > 0){
    const banner = document.getElementById('deadlineBanner');
    document.getElementById('deadlineBannerText').textContent =
      `3일 이내 마감 딜이 ${urgentDeals.length}건 있습니다: ${urgentDeals.slice(0,3).map(d=>d.title).join(', ')}${urgentDeals.length>3?' 외 '+( urgentDeals.length-3)+'건':''}`;
    banner.style.display = 'flex';
  }
}
function goToDeals(companyName){
  // 거래처뷰 닫고 칸반으로 이동
  document.getElementById('companiesView').style.display='none';
  document.getElementById('board').style.display='flex';
  document.getElementById('sortView').style.display='none';
  document.getElementById('dashView').style.display='none';
  document.getElementById('summaryBar').style.display='';
  document.getElementById('viewToggle').style.display='';
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
  document.querySelector('.stab').classList.add('on');
  currentView='kanban';
  renderAll();
  // 해당 회사 카드 하이라이트
  setTimeout(()=>{
    const cards = document.querySelectorAll('.deal-card');
    let found = null;
    cards.forEach(card=>{
      const companyEl = card.querySelector('.co-name');
      if(companyEl && companyEl.textContent.trim()===companyName){
        if(!found) found=card;
      }
    });
  if(found){
      found.scrollIntoView({behavior:'smooth',block:'center'});
      let count=0;
      const blink=setInterval(()=>{
        found.style.opacity=count%2===0?'0.2':'1';
        count++;
        if(count>=6){ clearInterval(blink); found.style.opacity='1'; }
      },250);
    }
  },150);
}
function toggleUserMenu(){
  const m = document.getElementById('userMenu');
  m.style.display = m.style.display==='none'?'block':'none';
}
document.addEventListener('click', e=>{
  const m = document.getElementById('userMenu');
  if(m && m.style.display!=='none' && !e.target.closest('#avatarBtn') && !e.target.closest('#userMenu'))
    m.style.display='none';
});
function logoutUser(){
  localStorage.removeItem('hyerim_crm_user');

}
renderAll();
setTimeout(checkDeadlineBanner, 700);
